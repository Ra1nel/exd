<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | CodeCraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/reset.css">
  <link rel="stylesheet" href="/styles/index.css">
</head>
<body>
  <canvas id="geoCanvas"></canvas>

  <header class="header">
    <a href="main.html" class="logo">CodeCraft</a>
    <a href="reg.html" class="nav-link">Зарегистрироваться</a>
  </header>

  <div class="main-wrapper">
    <div class="auth-card">
      <h2>Вход</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="login">Логин</label>
          <input type="text" id="login" required placeholder="Введите логин">
          <div class="error-msg" id="loginError">Неверный логин</div>
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" required placeholder="Введите пароль">
          <div class="error-msg" id="passwordError">Неверный пароль</div>
        </div>
        <button type="submit" class="submit-btn">Войти</button>
      </form>
      <div class="auth-footer">
        Впервые здесь? <a href="reg.html">Зарегистрироваться</a>
      </div>
    </div>
  </div>
  <script src="../scripts/index.js"></script>
</body>
</html>
